name: Daily AI Fund Advisor (Analysis)

on:
  schedule:
    # 北京时间 09:00 (UTC 01:00) 工作日
    - cron: '0 0 * * 1-5'
    # 北京时间 12:00 (UTC 04:00) 工作日
    - cron: '0 1 * * 1-5'
    # 北京时间 14:00 (UTC 06:00) 工作日
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

concurrency: 
  group: ai-analysis
  cancel-in-progress: true

# [关键修复] 必须添加写入权限，否则最后的 git push 会报错
permissions:
  contents: write

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    # 【🔥核心修复】增加超时时间到 60 分钟（默认可能较短），防止 v3.5 推理时被中断
    timeout-minutes: 60
    
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        # [关键] 获取完整历史，避免后续多次 push 时产生冲突
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        # 强制升级 akshare 到最新版
        pip install --upgrade akshare

    # ----------------------------------------------------------------
    # 步骤 1: 在运行主分析程序前，先执行新闻抓取逻辑
    # ----------------------------------------------------------------
    - name: 🕷️ Run News Crawler
      env:
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      run: |
        python news_loader.py

    - name: 💾 Commit and Push News Data
      run: |
        # 配置 git 用户
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

        # 添加新闻数据目录
        git add data_news/ || true

        # 检查是否有变动
        if [[ -n $(git status --porcelain) ]]; then
          echo "检测到新闻数据更新，正在提交..."
          git commit -m "📰 Auto-update News data [skip ci]"

          # [关键修复] 先拉取远程更新，避免冲突
          echo "正在同步远程更改..."
          git pull origin main --rebase || git pull origin master --rebase || true

          # 推送（带重试机制）
          for i in 1 2 3; do
            echo "尝试推送 (第 $i 次)..."
            git push && break
            echo "推送失败，等待后重试..."
            sleep 3
            git pull --rebase
          done
        else
          echo "No new news data found, skipping commit."
        fi

    # ----------------------------------------------------------------
    # 步骤 2: 运行分析系统
    # ----------------------------------------------------------------
    - name: 🧠 Run Analysis System
      env:
        # 邮箱配置
        EMAIL_USER: ${{ secrets.MAIL_USER }}
        EMAIL_PASS: ${{ secrets.MAIL_PASS }}
        EMAIL_TO: ${{ secrets.MAIL_USER }}
        
        # LLM 配置
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        
        # 代理配置
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        
      run: |
        # 运行主程序
        python main.py

    # ----------------------------------------------------------------
    # 步骤 3: 提交并保存投资组合账本
    # ----------------------------------------------------------------
    - name: Commit and Push Portfolio
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 检查 portfolio.json 是否有变化
        if [[ -n $(git status --porcelain portfolio.json) ]]; then
          git add portfolio.json
          git commit -m "📈 Auto-update portfolio ledger [skip ci]"
          
          # 清理工作区并尝试推送
          git checkout -- .
          git clean -fd
          git pull --rebase origin main
          git push
        else
          echo "No changes in portfolio."
        fi
