name: Daily AI Fund Advisor (Analysis)

on:
  schedule:
    # 北京时间 10:30 (UTC 02:30)
    - cron: '30 1 * * 1-5'
    # 北京时间 14:00 (UTC 06:00)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

concurrency: 
  group: ai-analysis
  cancel-in-progress: true

# [关键修复] 必须添加写入权限，否则最后的 git push 会报错
permissions:
  contents: write

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    # 【🔥核心修复】增加超时时间到 60 分钟（默认可能较短），防止 v3.5 推理时被中断
    timeout-minutes: 60
    
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧠 Run Analysis System
      env:
        # 邮箱配置
        EMAIL_USER: ${{ secrets.MAIL_USER }}
        EMAIL_PASS: ${{ secrets.MAIL_PASS }}
        EMAIL_TO: ${{ secrets.MAIL_USER }}
        
        # LLM 配置
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        
        # [新增] 代理配置，防止获取资金流和补全历史数据时被拦截
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        
      run: |
        # 运行主程序
        python main.py

    - name: Commit and Push Portfolio
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # 检查 portfolio.json 是否有变化
        if [[ -n $(git status --porcelain portfolio.json) ]]; then
          git add portfolio.json
          git commit -m "📈 Auto-update portfolio ledger [skip ci]"
          
          git checkout -- .
          git clean -fd
          # 使用 rebase 避免合并冲突
          git pull --rebase origin main
          git push
        else
          echo "No changes in portfolio."
        fi
