name: Daily Market Data Crawler

on:
  schedule:
    # 北京时间工作日 11:00, 12:00, 13:00, 14:00 运行
    # GitHub Actions 使用 UTC 时间，对应为 03:00, 04:00, 05:00, 06:00
    - cron: '0 3-6 * * 1-5'
  workflow_dispatch:

# 必须赋予写入权限
permissions:
  contents: write

jobs:
  fetch_market_data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        # [关键] 获取完整历史，避免 push 冲突
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        # 强制升级 akshare 到最新版
        pip install --upgrade akshare

    # ----------------------------------------------------------------
    # 步骤 1: 抓取 基金交易/行情数据 (Market)
    # ----------------------------------------------------------------
    - name: 📈 Run Market Data Fetcher
      # 🟢 [关键修改] 将 Secret 注入到环境变量，供 Python 读取
      env:
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      # 注意：由于代码中增加了东财50秒延时，请确保总运行时间不超过6小时
      run: |
        python data_fetcher.py

    # ----------------------------------------------------------------
    # 步骤 2: 提交并保存数据
    # ----------------------------------------------------------------
    - name: 💾 Commit and Push Market Data
      run: |
        # 配置 git 用户
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

        # 添加市场数据目录
        git add data_cache/ || true

        # 检查是否有变动
        if [[ -n $(git status --porcelain) ]]; then
          echo "检测到市场数据更新，正在提交..."
          git commit -m "📈 Auto-update Market data [skip ci]"

          # [关键修复] 先拉取远程更新，避免冲突
          echo "正在同步远程更改..."
          git pull origin main --rebase || git pull origin master --rebase || true

          # 推送（带重试机制）
          for i in 1 2 3; do
            echo "尝试推送 (第 $i 次)..."
            git push && break
            echo "推送失败，等待后重试..."
            sleep 3
            git pull --rebase
          done
        else
          echo "No new market data found, skipping commit."
        fi
